<div class="shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">Hotel planning</p>
      <h1>{{ title }}</h1>
    </div>

    <div class="topbar-actions">
      <nav class="nav" *ngIf="authUser()">
        <a
          routerLink="/configure"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Configure</a
        >
        <a routerLink="/plan" routerLinkActive="active">Plan</a>
        <a routerLink="/overview" routerLinkActive="active">Overview</a>
      </nav>

      <button
        type="button"
        class="auth-button auth-button--ghost"
        (click)="signOut()"
        [disabled]="authBusy()"
        *ngIf="authUser()"
      >
        Sign out
      </button>
    </div>
  </header>

  <section class="auth-panel" *ngIf="isLoadingAuth">
    <p>Checking authentication state...</p>
  </section>

  <section class="auth-panel" *ngIf="!isLoadingAuth && !authUser()">
    <h2>Sign in required</h2>
    <p>
      Use Google sign-in to access your planner data in Firestore.
      <span *ngIf="isEmulatorMode"
        >Local emulator mode uses a local test user.</span
      >
    </p>
    <button
      type="button"
      class="auth-button"
      (click)="signIn()"
      [disabled]="authBusy()"
    >
      {{ authBusy() ? 'Signing in...' : isEmulatorMode ? 'Continue (Local
      Emulator)' : 'Continue with Google' }}
    </button>
    <p class="auth-error" *ngIf="authError()">{{ authError() }}</p>
  </section>

  <router-outlet *ngIf="authUser()"></router-outlet>
</div>
