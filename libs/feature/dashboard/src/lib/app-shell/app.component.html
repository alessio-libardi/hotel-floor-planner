<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white/95">
    <div
      class="mx-auto flex w-full max-w-[1600px] items-center justify-between gap-4 px-4 py-3"
    >
      <div>
        <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Hotel</p>
        <h1 class="text-lg font-semibold leading-none">Hotel Floor Planner</h1>
      </div>

      <nav class="flex items-center gap-2">
        <a
          routerLink="/configure"
          routerLinkActive="bg-slate-900 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-2 text-sm font-medium text-slate-700"
        >
          Configure
        </a>
        <a
          routerLink="/plan"
          routerLinkActive="bg-slate-900 text-white"
          class="rounded-md px-3 py-2 text-sm font-medium text-slate-700"
        >
          Plan
        </a>
        <a
          routerLink="/overview"
          routerLinkActive="bg-slate-900 text-white"
          class="rounded-md px-3 py-2 text-sm font-medium text-slate-700"
        >
          Overview
        </a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-[1600px] p-4 md:p-6">
    <router-outlet></router-outlet>
  </main>
</div>
