<h2 mat-dialog-title>Note</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="seating-table-dialog-note-field">
    <mat-label>Table note</mat-label>
    <textarea
      matInput
      rows="4"
      [value]="note"
      placeholder="No note"
      readonly
    ></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Close</button>
</mat-dialog-actions>
