<h2 mat-dialog-title>Room {{ data.roomNumber }}</h2>

<mat-dialog-content>
  @if (data.tableNumber !== null) {
    <p>Table {{ data.tableNumber }}</p>
  } @else {
    <p>No table assigned</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Close</button>
</mat-dialog-actions>
