<section *ngIf="vm$ | async as vm" class="grid gap-4">
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full">
    <mat-card
      *ngFor="let floor of vm.floors; trackBy: trackByFloor"
      appearance="outlined"
      class="min-w-0 h-full"
    >
      <mat-card-header
        class="flex items-start justify-between gap-2 pb-2! border-b border-(--mat-sys-outline-variant)"
      >
        <mat-card-title>Floor {{ floor.number }}</mat-card-title>
        <mat-card-subtitle>{{ floor.rooms.length }} rooms</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <mat-action-list>
          <button
            mat-list-item
            *ngFor="let room of floor.rooms; trackBy: trackByRoom"
            type="button"
            (click)="
              openTableDetails(
                room.number,
                tableNumberForRoom(vm.roomToTableMap, room.number)
              )
            "
          >
            <div matListItemTitle>Room {{ room.number }}</div>
            <div matListItemLine>
              {{
                tableNumberForRoom(vm.roomToTableMap, room.number)
                  ? 'Table ' +
                    tableNumberForRoom(vm.roomToTableMap, room.number)
                  : 'No table'
              }}
            </div>
          </button>

          <mat-list-item *ngIf="!floor.rooms.length">
            <div matListItemTitle>No rooms</div>
          </mat-list-item>
        </mat-action-list>
      </mat-card-content>
    </mat-card>
  </div>
</section>
