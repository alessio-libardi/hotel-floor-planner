<section class="layout-page">
  <div class="layout-canvas">
    <div #stageHost class="layout-stage"></div>
  </div>

  <mat-toolbar class="layout-toolbar mat-elevation-z8">
    <div class="layout-toolbar-group">
      <button
        mat-icon-button
        type="button"
        aria-label="Pan mode"
        [color]="isPanMode() ? 'primary' : undefined"
        (click)="setPanMode(true)"
      >
        <mat-icon>pan_tool</mat-icon>
      </button>
      <button
        mat-icon-button
        type="button"
        aria-label="Edit mode"
        [color]="!isPanMode() ? 'primary' : undefined"
        (click)="setPanMode(false)"
      >
        <mat-icon>open_with</mat-icon>
      </button>
    </div>

    <span class="layout-toolbar-spacer"></span>

    <div class="layout-toolbar-group">
      <button
        mat-icon-button
        type="button"
        aria-label="Add table"
        (click)="addTable()"
      >
        <mat-icon>table_restaurant</mat-icon>
      </button>
      <button
        mat-icon-button
        type="button"
        aria-label="Add container"
        (click)="addColumn()"
      >
        <mat-icon>inventory_2</mat-icon>
      </button>
    </div>

    <span class="layout-toolbar-spacer"></span>

    <div class="layout-toolbar-group">
      <button
        mat-icon-button
        type="button"
        aria-label="Zoom out"
        (click)="zoomOut()"
      >
        <mat-icon>remove</mat-icon>
      </button>
      <button
        mat-icon-button
        type="button"
        aria-label="Reset view"
        (click)="resetView()"
      >
        <mat-icon>center_focus_strong</mat-icon>
      </button>
      <button
        mat-icon-button
        type="button"
        aria-label="Zoom in"
        (click)="zoomIn()"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </mat-toolbar>
</section>
