<h2 mat-dialog-title>Edit item</h2>

<mat-dialog-content class="grid gap-4">
  @if (selectedItem.type === 'table') {
    <mat-form-field appearance="outline">
      <mat-label>Room</mat-label>
      <mat-select
        [value]="selectedItem.roomNumber ?? ''"
        (selectionChange)="updateSelectedRoom(($event.value ?? '') + '')"
      >
        <mat-option value="">Unassigned</mat-option>
        <mat-option
          *ngFor="let room of data.roomOptions"
          [value]="room.roomNumber"
        >
          {{ roomLabel(room) }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="grid gap-2">
      <p class="m-0 text-xs text-slate-500">
        Link tables so groups can sit together across rooms.
      </p>

      <div
        class="grid gap-2"
        *ngIf="availableLinkTargets().length; else noTablesToLink"
      >
        <button
          *ngFor="let table of availableLinkTargets()"
          mat-stroked-button
          type="button"
          [color]="isLinkedToSelected(table.id) ? 'primary' : undefined"
          (click)="toggleSelectedTableLink(table.id)"
        >
          <mat-icon>{{
            isLinkedToSelected(table.id) ? 'link_off' : 'link'
          }}</mat-icon>
          {{ isLinkedToSelected(table.id) ? 'Unlink' : 'Link' }}
          {{ tableDisplay(table) }}
        </button>
      </div>

      <ng-template #noTablesToLink>
        <p class="m-0 text-xs text-slate-500">
          Add at least two tables to create a link.
        </p>
      </ng-template>
    </div>
  } @else {
    <mat-form-field appearance="outline">
      <mat-label>Label</mat-label>
      <input
        matInput
        type="text"
        [value]="selectedItem.text"
        (input)="updateSelectedText(textInput.value)"
        #textInput
      />
    </mat-form-field>
  }

  <p class="m-0 text-xs text-slate-500">
    Drag items on grid. Use pan mode to move the canvas when zoomed.
  </p>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button type="button" color="warn" (click)="deleteSelected()">
    Delete
  </button>
  <span class="flex-1"></span>
  <button mat-button type="button" (click)="close()">Done</button>
</mat-dialog-actions>
