services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-floor-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_floor_planner
    ports:
      - '5432:5432'
    volumes:
      - hotel-floor-planner-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hotel_floor_planner']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hotel-floor-planner-postgres-data: