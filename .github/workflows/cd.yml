name: CD

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches:
      - main

concurrency:
  group: firebase-preview-global
  cancel-in-progress: true

jobs:
  preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy shared preview channel
        run: npx firebase-tools hosting:channel:deploy preview --project hotel-floor-planner --expires 7d --json
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  cleanup_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Cleanup Preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delete shared preview channel
        run: npm run firebase:deploy -- hosting:channel:delete preview --project hotel-floor-planner --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  live:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Live
    environment:
      name: Live
      url: ${{ vars.WEBSITE_URL }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}'
          credentials_file_path: '${{ github.workspace }}/google-application-credentials.json'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy hosting and firestore rules
        run: npm run firebase:deploy -- --project hotel-floor-planner --only hosting,firestore:rules,firestore:indexes
